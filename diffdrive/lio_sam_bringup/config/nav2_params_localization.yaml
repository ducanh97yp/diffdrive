# Same as nav2_params.yaml, for use with lio_sam_localization_launch.py instead of
# lio_sam_slam_launch.py. Only global_costmap differs: nav2_params.yaml's global_costmap
# has no static_layer because a pure-SLAM run has no prior map to load, and always
# publishing one there (if /map never arrives) would leave that layer - and therefore
# the whole costmap - stuck "not current", blocking planning. This file is only meant to
# be paired with a run where pcd_map_localizer is actually publishing /map (a 2D
# occupancy grid projected from the loaded GlobalMap.pcd, latched/transient-local like
# nav2_map_server's own /map), so a static_layer is safe to add here permanently.
#
# global_costmap goes non-rolling here (dropping rolling_window/width/height) - once a
# static_layer is present, nav2_costmap_2d auto-sizes the costmap to match the received
# map's own width/height/resolution, the standard nav2 pattern for a known-map robot.
# See lio_sam_bringup/README section 3b/4 for how these two pieces fit together.

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /lio_sam/mapping/odometry_incremental
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5
      # Same speed increase as nav2_params.yaml - see that file's comment for rationale.
      # vx_std raised further than a naive proportional scaling (0.4 -> 0.8, not 0.4):
      # MPPI samples control noise around the *current* velocity, not a target - with
      # the robot already cruising near 0, a std of 0.4 (1-sigma range ~[-0.27, 0.53])
      # rarely even samples close to the new 1.0 vx_max, so most of that weighted-average
      # control still lands in the same low-speed regime the old, narrower std produced -
      # confirmed empirically (raising vx_max alone left actual cruise speed unchanged at
      # ~0.13 m/s, 2.8m from the goal, nowhere near a deceleration zone). iteration_count
      # raised 1 -> 2 so it gets a second refinement pass per control cycle instead of
      # relying entirely on one wide-but-blind sampling round.
      vx_std: 0.8
      vy_std: 0.2
      wz_std: 0.6
      vx_max: 1.0
      vx_min: -0.7
      vy_max: 0.5
      wz_max: 2.5
      iteration_count: 2
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        # offset_from_furthest raised 5 -> 25 (path points, ~0.05m apart at costmap
        # resolution -> "carrot" target moved from ~0.25m ahead to ~1.25m ahead).
        # Confirmed empirically: raising vx_max/vx_std alone left cruise speed
        # unchanged (~0.1-0.14 m/s, mid-corridor, nowhere near a deceleration zone) -
        # with the reward target only 0.25m ahead, there was never a reason for MPPI
        # to actually go faster to reach it. A farther carrot gives it something to
        # actually chase.
        offset_from_furthest: 25
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.2
      # voxel_layer/ObstacleLayer replaced by elevation_traversability_layer, a
      # custom slope-aware layer - see nav2_params.yaml's copy of this section for
      # the full story (short version: z-threshold marking treated the small ramps
      # as walls; coexisting instead of replacing wouldn't fix it since
      # CostmapLayer::updateWithMax's max-combination would let the old layer's
      # lethal marks win regardless).
      plugins: ["elevation_traversability_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.70
      elevation_traversability_layer:
        plugin: "lio_sam_bringup::ElevationTraversabilityLayer"
        point_cloud_topic: /ouster_points
        obstacle_min_range: 0.6
        obstacle_max_range: 2.5
        slope_check_radius_cells: 4
        caution_slope_deg: 15.0
        max_slope_deg: 35.0
        height_alpha_down: 1.0
        height_alpha_up: 0.02
        publish_debug_grid: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.2
      resolution: 0.05
      track_unknown_space: true
      # No rolling_window/width/height here (unlike nav2_params.yaml) - static_layer
      # below auto-sizes the costmap to match /map's own extent once it arrives.
      # elevation_traversability_layer here is non-rolling too (matchSize() only
      # fires once at startup), so its height grid accumulates for the whole run -
      # see elevation_traversability_layer.cpp's updateOrigin() comment.
      plugins: ["static_layer", "elevation_traversability_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /map
        # Matches pcd_map_localizer's /map QoS (see pcd_map_localizer.cpp) - the same
        # pattern nav2_map_server itself uses for a latched, load-once map.
        map_subscribe_transient_local: True
      elevation_traversability_layer:
        plugin: "lio_sam_bringup::ElevationTraversabilityLayer"
        point_cloud_topic: /ouster_points
        obstacle_min_range: 0.6
        obstacle_max_range: 2.5
        slope_check_radius_cells: 4
        caution_slope_deg: 15.0
        max_slope_deg: 35.0
        height_alpha_down: 1.0
        height_alpha_up: 0.02
        publish_debug_grid: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: True
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
