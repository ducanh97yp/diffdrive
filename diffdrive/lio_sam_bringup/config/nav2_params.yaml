# Nav2 params for the LIO-SAM + Ouster OS1 stack. Only the servers actually launched
# by nav2_bringup_launch.py are configured here (planner_server, controller_server,
# behavior_server, bt_navigator, plus their costmaps) - no amcl/map_server (LIO-SAM
# does its own localization, no separate AMCL step) and no docking_server/
# loopback_simulator (unused).
#
# global_frame is "map" / "odom" (LIO-SAM's own frames, published via TransformFusion
# in imuPreintegration.cpp plus lio_sam_slam_launch.py's static map->odom link) instead
# of fast_lio's old "camera_init" - LIO-SAM has a proper map->odom->base_link chain,
# so no custom TF bridge script is needed here (unlike fast_lio's fastlio_tf_bridge.py).
#
# Our simulated Ouster OS1 only publishes PointCloud2 (no native 2D LaserScan bridge
# exists - see diff_description/launch/rviz_joint_control.launch.py, which only
# bridges /scan/points), so the costmaps' obstacle/voxel layers observe /ouster_points
# directly as a PointCloud2 source instead of the more common LaserScan pattern.

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /lio_sam/mapping/odometry_incremental
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5
      # Doubled vx_max/vx_min (0.5/-0.35 -> 1.0/-0.7) and raised wz_max (1.9 -> 2.5) for
      # faster Nav2-commanded driving. vx_std raised well beyond a naive proportional
      # scaling (0.8, not ~0.4) - MPPI samples control noise around the *current*
      # velocity, not a target, so from a near-zero cruise a narrower std rarely even
      # samples close to the new vx_max, leaving actual cruise speed unchanged despite
      # the higher ceiling (confirmed empirically in nav2_params_localization.yaml's
      # copy of this section - see its comment). iteration_count raised 1 -> 2 for a
      # second refinement pass per control cycle. ax_max/az_max left as-is - already
      # enough headroom to reach the new vx_max in ~0.33s.
      vx_std: 0.8
      vy_std: 0.2
      wz_std: 0.6
      vx_max: 1.0
      vx_min: -0.7
      vy_max: 0.5
      wz_max: 2.5
      iteration_count: 2
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic",
        "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        # See nav2_params_localization.yaml's copy of this section for why this was
        # raised from 5 - the actual lever for cruise speed, confirmed empirically.
        offset_from_furthest: 25
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.2
      # voxel_layer/ObstacleLayer (z-threshold only, marks any point with z>=0 as an
      # obstacle) replaced by elevation_traversability_layer, a custom slope-aware
      # layer (lio_sam_bringup/src/elevation_traversability_layer.cpp) - the
      # z-threshold approach treated the small ramps in house.world/terrain_test.world
      # as walls, so Nav2 refused to climb them even though manual teleop (which
      # never consults the costmap) climbed fine. Coexisting instead of replacing
      # wouldn't fix it: CostmapLayer::updateWithMax takes the max cost across layers,
      # so a voxel_layer/obstacle_layer still marking ramp cells 254 would always win
      # over this layer's lower slope-derived cost regardless of plugin order. Real
      # walls/furniture aren't lost - they still read near-90 degree local slope
      # regardless of exact height, so they're still LETHAL_OBSTACLE under the new
      # layer too. See lio_sam_bringup/README.md for the fuller writeup.
      plugins: ["elevation_traversability_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.70
      elevation_traversability_layer:
        plugin: "lio_sam_bringup::ElevationTraversabilityLayer"
        point_cloud_topic: /ouster_points
        obstacle_min_range: 0.6
        obstacle_max_range: 2.5
        slope_check_radius_cells: 4
        caution_slope_deg: 15.0
        max_slope_deg: 35.0
        height_alpha_down: 1.0
        height_alpha_up: 0.02
        publish_debug_grid: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.2
      resolution: 0.05
      track_unknown_space: true
      # rolling_window (2026-07-11) - without a static_layer (no pre-built map to
      # load - LIO-SAM builds the map live, same as local_costmap already assumed),
      # a non-rolling global costmap defaults to a small fixed box anchored at world
      # origin (0,0)-(4.98,4.98) - confirmed via Nav2's own "Sensor origin ... out of
      # map bounds" warning once the robot drove outside that box. rolling_window
      # keeps it centered on the robot instead, same fix pattern as local_costmap.
      rolling_window: true
      width: 20
      height: 20
      # See local_costmap's comment above - same replacement, same reasoning.
      plugins: ["elevation_traversability_layer", "inflation_layer"]
      elevation_traversability_layer:
        plugin: "lio_sam_bringup::ElevationTraversabilityLayer"
        point_cloud_topic: /ouster_points
        obstacle_min_range: 0.6
        obstacle_max_range: 2.5
        slope_check_radius_cells: 4
        caution_slope_deg: 15.0
        max_slope_deg: 35.0
        height_alpha_down: 1.0
        height_alpha_up: 0.02
        publish_debug_grid: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.7
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: True
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    costmap_update_timeout: 1.0
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: True
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
