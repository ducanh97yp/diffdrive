controller_manager:
  ros__parameters:
    # Tan so cap nhat controller. Nen gan voi physics/update rate cua mo phong.
    update_rate: 30
    # Without this, diff_cont/joint_broad stamp their messages with wall-clock time
    # while the rest of the graph (Gazebo bridges, lidar, IMU, fast_lio) runs on sim
    # time - a real epoch time treated as a time delta corrupts any node fusing it.
    use_sim_time: true

    # diff_cont dieu khien 2 banh theo lenh van toc.
    diff_cont:
      type: diff_drive_controller/DiffDriveController

    # joint_broad publish joint states de robot_state_publisher/RViz thay banh xe.
    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_cont:
  ros__parameters:
    # Jazzy diff_drive_controller dang nhan TwistStamped, nen /cmd_vel duoc chuyen
    # sang /cmd_vel_stamped boi scripts/cmd_vel_stamper.py.
    use_stamped_vel: true
    # publish_rate khong the vuot qua controller_manager.update_rate (30 Hz) o tren,
    # de 50 la vo nghia (controller chi tinh duoc 30 lan/s).
    publish_rate: 30.0

    # Ten frame phai trung voi URDF. Controller publish odom -> base_link.
    base_frame_id: base_link
    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']

    # Kich thuoc thuc cua robot, dung de tinh odometry tu toc do banh.
    # wheel_separation la khoang cach giua tam 2 banh.
    wheel_separation: 0.471
    wheel_radius: 0.0855


    open_loop: false    

    # wheels_per_side: x
    # wheel_separation_multiplier: x
    # left_wheel_radius_multiplier: x
    # right_wheel_radius_multiplier: x

    odom_frame_id: odom
    # pose_covariance_diagonal: [0.001, 0.001, 1000000, 1000000, 1000000, 0.03]
    # twist_covariance_diagonal: [0.001, 0.001, 1000000, 1000000, 1000000, 0.03]
    # open_loop: x
    # fast_lio provides its own camera_init -> base_link TF (fastlio_bringup's
    # fastlio_tf_bridge.py), so diff_cont must NOT also broadcast odom -> base_link -
    # two publishers claiming base_link's TF parent made Nav2's tf2 buffer flip
    # between two disconnected trees. /diff_cont/odom (the topic) still publishes
    # fine and is simply unused by this architecture (no wheel odometry is fused).
    enable_odom_tf: false

    # cmd_vel_timeout: 0.5
    # publish_limited_velocity: x
    # velocity_rolling_window_size: x
    

    # linear.x.has_velocity_limits: false
    # linear.x.has_acceleration_limits: false
    # linear.x.has_jerk_limits: false
    # linear.x.max_velocity: NAN
    # linear.x.min_velocity: NAN
    # linear.x.max_acceleration: NAN
    # linear.x.min_acceleration: NAN
    # linear.x.max_jerk: NAN
    # linear.x.min_jerk: NAN

    # angular.z.has_velocity_limits: false
    # angular.z.has_acceleration_limits: false
    # angular.z.has_jerk_limits: false
    # angular.z.max_velocity: NAN
    # angular.z.min_velocity: NAN
    # angular.z.max_acceleration: NAN
    # angular.z.min_acceleration: NAN
    # angular.z.max_jerk: NAN
    # angular.z.min_jerk: NAN



# joint_broad khong can override param: mac dinh use_local_topics=false nen no da
# publish thang ra /joint_states, khong can them node joint_state_publisher de
# relay/merge nua - do bot mot hop topic va giam do tre.
